security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                success_handler: App\Security\AuthenticationSuccessHandler
            custom_authenticators:
                - App\Security\GoogleAuthenticator
            logout:
                path: app_logout
                target: app_login
        connect:
            pattern: ^/connect
            security: true  # Remplacez `false` par `true` pour activer la sécurité

    access_control:
        - { path: ^/connect/facebook, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: [ROLE_ADMIN] }
        - { path: ^/cours, roles: [ROLE_ENS] }
        - { path: ^/etudiant, roles: [ROLE_ETU] }
        - { path: ^/connect/google, roles: PUBLIC_ACCESS }
        - { path: ^/connect/google/check, roles: PUBLIC_ACCESS }
        - { path: ^/profile, roles: [ROLE_ETU] }
